<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Corner | Inicio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .product-img-container {
            width: 100%; height: 120px; background: #f9f9f9; border-radius: 20px; margin-bottom: 10px;
            overflow: hidden; display: flex; align-items: center; justify-content: center;
        }
        .product-img-container img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <audio id="clinkSound" src="https://www.soundjay.com/buttons/sounds/button-37a.mp3" preload="auto"></audio>

    <header>
        <img src="loguito.png" alt="HappyCorner" class="logo-img">
        <nav class="nav-desktop">
            <a href="/index">Inicio</a>
            <a href="/catalogo">Catálogo</a>
            <a href="/order">HappyOrder</a>
            <a href="/loyalty">LoyaltyCorner</a>
            <a href="/track">Rastrear Pedido</a>
            <a href="/terminos">Terminos</a>
        </nav>
        <div class="menu-btn" id="menuBtn">
            <span></span><span></span><span></span>
        </div>
    </header>

    <div class="overlay" id="overlay"></div>
    <nav class="side-menu" id="sideMenu">
        <a href="/index">Inicio</a>
        <a href="/catalogo">Catálogo</a>
        <a href="/order">HappyOrder</a>
        <a href="/loyalty">LoyaltyCorner</a>
        <a href="/track">Rastrear Pedido</a>
        <a href="/terminos">Términos</a>
            <a href="/wallet">Happy Passes</a>
        <a href="/wallet">Happy Passes</a>
    </nav>

    <div class="carousel-container">
        <button class="arrow prev" onclick="moveSlide(-1)">❮</button>
        <button class="arrow next" onclick="moveSlide(1)">❯</button>
        <div class="track" id="track">
            <div class="slide" style="background-image: url('promo1.jpg')"></div>
            <div class="slide" style="background-image: url('promo2.jpg')"></div>
            <div class="slide" style="background-image: url('promo3.jpg')"></div>
        </div>
    </div>

    <h1 style="text-align: center; font-size: 20px; margin: 25px 0 10px;">Hot Products 🔥</h1>

    <div class="section-tag">Combos & Favoritos 🍕🍪</div>
    <div class="grid">
        <!-- Pizza -->
        <div class="card" id="pizza-normal">
            <div class="product-img-container"><img src="pizza.png" alt="Pizza Normal"></div>
            <div class="product-name">Pizza</div>
            <div class="price">$11.000</div>
            <div class="qty-controls">
                <button class="qty-btn" onclick="qty('pizza-normal',-1)">-</button>
                <span class="qty-num">1</span>
                <button class="qty-btn" onclick="qty('pizza-normal',1)">+</button>
            </div>
            <button class="add-btn" onclick="add('pizza-normal')">Añadir</button>
        </div>


        <!-- Galleta Red Velvet -->
        <div class="card" id="galleta-red-velvet">
            <div class="product-img-container"><img src="grv.png" alt="Galleta Red Velvet"></div>
            <div class="product-name">Galleta Red Velvet</div>
            <div class="price">$6.000</div>
            <div class="qty-controls">
                <button class="qty-btn" onclick="qty('galleta-red-velvet',-1)">-</button>
                <span class="qty-num">1</span>
                <button class="qty-btn" onclick="qty('galleta-red-velvet',1)">+</button>
            </div>
            <button class="add-btn" onclick="add('galleta-red-velvet')">Añadir</button>
        </div>

        <!-- Ring Pop -->
        <div class="card" id="ring-pop">
            <div class="product-img-container"><img src="rp.png" alt="Ring Pop"></div>
            <div class="product-name">Ring Pop</div>
            <div class="price">$3.500</div>
            <div class="qty-controls">
                <button class="qty-btn" onclick="qty('ring-pop',-1)">-</button>
                <span class="qty-num">1</span>
                <button class="qty-btn" onclick="qty('ring-pop',1)">+</button>
            </div>
            <button class="add-btn" onclick="add('ring-pop')">Añadir</button>
        </div>
    </div>



    <div id="toast">
        <div class="toast-check">✓</div>
        <span id="toast-text"></span>
    </div>

    <a href="/order" class="cart-fixed">
        🛒<div class="badge" id="cart-count">0</div>
    </a>

    <div style="text-align: center; padding: 30px; margin-bottom: 20px;">
        <a href="/manager" style="color: #bbb; text-decoration: none; font-size: 11px;">🛠️ Administración</a>
    </div>

    <script>
        // Menú Lateral
        const menuBtn = document.getElementById('menuBtn');
        const sideMenu = document.getElementById('sideMenu');
        const overlay = document.getElementById('overlay');

        menuBtn.onclick = () => {
            sideMenu.classList.toggle('active');
            overlay.classList.toggle('active');
        };

        overlay.onclick = () => {
            sideMenu.classList.remove('active');
            overlay.classList.remove('active');
        };

        // Carousel
        let currentIdx = 0;
        const track = document.getElementById('track');
        function moveSlide(step) {
            currentIdx = (currentIdx + step + 3) % 3;
            track.style.transform = `translateX(-${currentIdx * 100}%)`;
        }
        setInterval(() => moveSlide(1), 5000);

        // Carrito (sincronizado con catalogo y order: hc_cart con id, name, price, qty)
        function qty(id, d) {
            let s = document.querySelector(`#${id} .qty-num`);
            let v = parseInt(s.innerText) + d;
            if (v > 0) s.innerText = v;
        }

        function add(id) {
            document.getElementById('clinkSound').play().catch(() => {});
            const card = document.getElementById(id);
            const name = card.querySelector('.product-name').innerText;
            const priceVal = card.querySelector('.price').innerText.replace(/[^0-9]/g, '');
            const price = parseInt(priceVal) || 0;
            const qtyVal = parseInt(card.querySelector('.qty-num').innerText);

            let cart = JSON.parse(localStorage.getItem('hc_cart')) || [];
            const existingIndex = cart.findIndex(item => item.id === id);
            if (existingIndex > -1) {
                cart[existingIndex].qty += qtyVal;
            } else {
                cart.push({ id, name, price, qty: qtyVal });
            }
            localStorage.setItem('hc_cart', JSON.stringify(cart));

            const total = cart.reduce((sum, item) => sum + item.qty, 0);
            document.getElementById('cart-count').innerText = total;

            const toast = document.getElementById('toast');
            document.getElementById('toast-text').innerHTML = `<b>${qtyVal > 1 ? qtyVal + 'x ' : ''}${name}</b> añadido`;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);

            card.querySelector('.qty-num').innerText = '1';
        }

        function addCustomRobux() {
            const amountInput = document.getElementById('custom-robux-amount').value;
            const amount = parseInt(amountInput);
            if (!amount || amount <= 0) {
                alert("Por favor ingresa una cantidad válida de Robux.");
                return;
            }

            document.getElementById('clinkSound').play().catch(() => {});
            const name = `Robux Personalizado (${amount} R$)`;
            const price = 0; // A convenir
            const id = `robux-custom-${Date.now()}`;

            let cart = JSON.parse(localStorage.getItem('hc_cart')) || [];
            cart.push({ id, name, price, qty: 1, isCustomRobux: true });
            localStorage.setItem('hc_cart', JSON.stringify(cart));

            updateCartBadge();
            
            const toast = document.getElementById('toast');
            document.getElementById('toast-text').innerHTML = `<b>${name}</b> añadido`;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
            document.getElementById('custom-robux-amount').value = '';
        }

        function updateCartBadge() {
            const cart = JSON.parse(localStorage.getItem('hc_cart')) || [];
            document.getElementById('cart-count').innerText = cart.reduce((sum, item) => sum + item.qty, 0);
        }
        window.onload = updateCartBadge;
    </script>
</body>
</html>
